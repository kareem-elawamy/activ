services:
  app:
    build: .
    container_name: activ_node_app
    restart: unless-stopped
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/coaching_db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules

  mongodb:
    image: mongo:6-jammy
    container_name: activ_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: node:20-alpine
    container_name: activ_frontend
    restart: unless-stopped
    working_dir: /app
    ports:
      - "3001:3000"
    volumes:
      - ./activ:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install --legacy-peer-deps && npm install --legacy-peer-deps tailwindcss@3 postcss autoprefixer && npm run dev"
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - NEXT_PUBLIC_API_URL=http://localhost:3000
      - INTERNAL_API_URL=http://app:3000

volumes:
  mongodb_data:
  frontend_node_modules:
